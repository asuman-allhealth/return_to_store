<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Open all.health</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background-color: #fafafa;
    }

    .page {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 28px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 320px;
      text-align: center;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 48px 36px;
      box-sizing: border-box;
    }

    .page-footer {
      margin-top: 20px;
      font-size: 14px;
      color: #9e9e9e;
      text-align: center;
    }

    .brand-logo {
      width: 99px;
      height: 72px;
      display: block;
      margin: 0 auto 16px;
      color: #111827;
      shape-rendering: geometricPrecision;
    }

    h2 {
      margin-bottom: 8px;
    }

    .sub {
      font-size: 14px;
      color: #555;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .btn {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      color: white;
      background-color: #007AFF;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 12px;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    .btn.secondary {
      background-color: #34a853;
    }

    .btn.ios {
      background-color: #4b535e;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .emphasize {
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.35);
    }
  </style>
</head>

<body>
  <div class="page">
    <main class="card">
    <svg class="brand-logo" width="99" height="72" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AllHealth">
      <title>AllHealth</title>
      <path d="M17.947 11.076c-.4-1.757-2.395-2.794-4.71-1.677-1.038.56-.799.719-.958.32-.719-2.475-1.198-5.908-3.992-7.186C3.657.378-1.453 5.088.383 10.677c.879 2.634 3.114 4.47 5.988 4.47 2.155 0 3.672-1.197 5.11-2.874.399-.399-.08-.16.957.958 2.076 2.395 6.068.799 5.509-2.155zm-6.786 0c-1.118 1.277-2.395 2.315-4.072 2.554-2.794.32-5.348-1.676-5.508-4.79-.24-2.874 1.756-5.508 4.79-5.269 2.714.24 3.433 2.635 4.151 5.27.719 2.554.719 2.155.639 2.235zm5.349 1.277c-.48.799-1.916.958-2.794.08-.4-.4-.719-.958-.958-1.517 2.475-2.076 4.79-.16 3.752 1.437z" fill="currentColor"></path>
    </svg>
    <h2>Install all.health</h2>
    <p class="sub" id="sub">Redirecting to your app store… If nothing happens, choose below.</p>

    <!-- Default https; script switches to itms-apps:// on iOS (fixes many “Cannot connect to iTunes Store” errors). -->
    <a id="btnApple" class="btn ios" href="https://apps.apple.com/app/id1668893392">App Store (iPhone / iPad)</a>
    <a id="btnPlay" class="btn secondary" href="https://play.google.com/store/apps/details?id=health.all">Google Play (Android)</a>
    </main>
    <footer class="page-footer">© 2026 all.health</footer>
  </div>

  <script>
    (function () {
      var PLAY = "https://play.google.com/store/apps/details?id=health.all";
      var APPLE_HTTP = "https://apps.apple.com/app/id1668893392";
      // Opens App Store app directly; https:// often fails from in-app browsers with “Cannot connect to iTunes Store”.
      var APPLE_ITMS = "itms-apps://apps.apple.com/app/id1668893392";

      function setAppleBtnHref(useItms) {
        document.getElementById("btnApple").href = useItms ? APPLE_ITMS : APPLE_HTTP;
      }

      function shouldUseItmsForApple(q, uaPlatform) {
        if (platformFromQuery(q) === "ios") return true;
        if (platformFromQuery(q) === "android") return false;
        return uaPlatform === "ios";
      }

      function parseQuery(search) {
        var out = {};
        if (!search || search.charAt(0) !== "?") return out;
        var pairs = search.slice(1).split("&");
        for (var i = 0; i < pairs.length; i++) {
          var p = pairs[i];
          var eq = p.indexOf("=");
          var k = eq >= 0 ? p.slice(0, eq) : p;
          var v = eq >= 0 ? p.slice(eq + 1) : "";
          try {
            k = decodeURIComponent(k.replace(/\+/g, " "));
            v = decodeURIComponent(v.replace(/\+/g, " "));
          } catch (e) { /* ignore */ }
          out[k.toLowerCase()] = v;
        }
        return out;
      }

      function platformFromQuery(q) {
        var p = (q.platform || q.os || "").toLowerCase();
        if (p === "ios" || p === "iphone" || p === "ipad") return "ios";
        if (p === "android") return "android";
        return null;
      }

      function platformFromUA() {
        var ua = navigator.userAgent || "";
        var uaLower = ua.toLowerCase();
        if (/android/i.test(ua)) return "android";
        if (/iphone|ipod/i.test(ua)) return "ios";
        if (/ipad/i.test(ua)) return "ios";
        if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) return "ios";
        if (/\bos=\d+_\d+ like mac os x\b/i.test(ua)) return "ios";
        if (/cpu (?:iphone|ipad) os/i.test(uaLower)) return "ios";
        if (/webkit/i.test(ua) && !/android/i.test(ua)) {
          if (/mobile\/\w+/i.test(ua) || /crios|fxios|edgios|opios/i.test(uaLower)) return "ios";
        }
        return "unknown";
      }

      function applyChromeHints(cb) {
        var ud = navigator.userAgentData;
        if (!ud || typeof ud.getHighEntropyValues !== "function") {
          cb(null);
          return;
        }
        ud.getHighEntropyValues(["platform"]).then(function (hint) {
          var plat = (hint.platform || "").toLowerCase();
          if (plat === "android") cb("android");
          else if (plat === "ios") cb("ios");
          else cb(null);
        }).catch(function () {
          cb(null);
        });
      }

      function emphasize(which) {
        var apple = document.getElementById("btnApple");
        var play = document.getElementById("btnPlay");
        apple.classList.remove("emphasize");
        play.classList.remove("emphasize");
        if (which === "ios") apple.classList.add("emphasize");
        if (which === "android") play.classList.add("emphasize");
      }

      function tryAutoNavigate(url) {
        try {
          window.location.replace(url);
        } catch (e) { /* ignore */ }
      }

    /** Default: auto-redirect when OS is detected. Opt out: ?no_redirect=1 or ?auto=0 */  
      function wantsAutoRedirect(q) {
        if (q.no_redirect === "1") return false;
        if (q.auto === "0") return false;
        return true;
      }

      function redirectUrlForPlatform(platform) {
        if (platform === "android") return PLAY;
        if (platform === "ios") return APPLE_ITMS;
        return null;
      }

      var q = parseQuery(window.location.search || "");
      var forced = platformFromQuery(q);
      var fromUA = platformFromUA();

      setAppleBtnHref(shouldUseItmsForApple(q, fromUA));

      var effectivePlatform = forced || (fromUA !== "unknown" ? fromUA : null);

      if (wantsAutoRedirect(q) && effectivePlatform) {
        tryAutoNavigate(redirectUrlForPlatform(effectivePlatform));
        return;
      }

      document.getElementById("sub").textContent =
        "Choose your app store";

      if (forced) {
        emphasize(forced);
        document.getElementById("sub").textContent =
          forced === "ios"
            ? "Your link is for iPhone/iPad — open the App Store below."
            : "Your link is for Android — open Google Play below.";
        return;
      }

      if (fromUA !== "unknown") {
        emphasize(fromUA);
        return;
      }

      applyChromeHints(function (hinted) {
        if (hinted && wantsAutoRedirect(q)) {
          setAppleBtnHref(hinted === "ios");
          tryAutoNavigate(redirectUrlForPlatform(hinted));
          return;
        }
        if (hinted === "ios") setAppleBtnHref(true);
        if (hinted) emphasize(hinted);
      });
    })();
  </script>
</body>
</html>
